# Messages for the STIG Manager sample login theme (CAC/PIV self-registration guidance).
# NOTE: Keycloak runs these through java.text.MessageFormat, where a single quote (')
# is an escape character. Use a doubled quote ('') to render a literal apostrophe.

cacLoginHintTitle=First time signing in with a CAC/PIV smartcard?
cacLoginHintBody=If you see an "Invalid user" message above, it just means no account is linked to your certificate yet. Click Register below and set your username to your certificate''s Common Name (CN).

cacRegisterHintTitle=Using a CAC/PIV smartcard?
cacRegisterHintBody=Set your username to your certificate''s Common Name (CN) so your card signs you in automatically next time. Not using a smartcard? Just pick any username.

cacFindCnLink=View your certificate''s CN ↗
