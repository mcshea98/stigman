parent=keycloak
import=common/keycloak

# STIG Manager sample login theme.
# Adds static CAC/PIV self-registration guidance to login.ftl and register.ftl:
# first-time smartcard users are told to register with their certificate's Common
# Name (CN) as the username, so the built-in X.509 authenticator maps the cert to
# that account on later logins.
# login.ftl / register.ftl are copies of the Keycloak 26.6.3 stock templates with a
# guidance banner added; re-sync them on major Keycloak upgrades.
# Everything else is inherited from the stock "keycloak" login theme.
